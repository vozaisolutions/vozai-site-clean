        // Form handling with validation
        document.getElementById('smsOptinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const consent = document.getElementById('consent').checked;
            const phone = document.getElementById('phone').value;
            const name = document.getElementById('name').value;
            
            if (!consent) {
                alert('Please agree to receive SMS notifications to continue.');
                return;
            }
            
            // Disable button and show success
            submitBtn.disabled = true;
            submitBtn.textContent = '✓ Subscription Confirmed';
            submitBtn.style.background = '#10b981';
            
            // In production, send this data to your backend
            const formData = {
                name: name,
                phone: phone,
                consent: consent,
                timestamp: new Date().toISOString(),
                source: 'vozai_landing_page'
            };
            
            console.log('SMS Opt-in Data:', formData);
            
            // Reset form after 3 seconds
            setTimeout(() => {
                this.reset();
                submitBtn.disabled = false;
                submitBtn.textContent = 'Subscribe to SMS Updates';
                submitBtn.style.background = '#14B8A6';
            }, 3000);
        });
